name: Deploy to Railway

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Deploy to Railway
      uses: railwayapp/action@v1.0.0
      with:
        # Railway项目ID - 需要在Railway创建项目后获取
        projectId: ${{ secrets.RAILWAY_PROJECT_ID }}
        # Railway token - 需要在Railway设置中生成
        token: ${{ secrets.RAILWAY_TOKEN }}
        # 环境变量
        environment: 'production'
        
    - name: Verify deployment
      run: |
        echo "✅ 部署完成！"
        echo "WebSocket服务器地址: wss://${{ secrets.RAILWAY_PROJECT_NAME }}.up.railway.app"
        echo "HTTP地址: https://${{ secrets.RAILWAY_PROJECT_NAME }}.up.railway.app"